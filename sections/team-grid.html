<!-- Team: Four Column Grid
     Grayscale images that reveal color on hover (Studio-inspired) -->
<ul style="list-style:none; padding:0; display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:20px;">
  <li>
    <div style="aspect-ratio:3/4; overflow:hidden; border-radius:var(--radius);">
      <img src="https://source.unsplash.com/400x533/?portrait,professional" alt="Team member"
        style="width:100%; height:100%; object-fit:cover; filter:grayscale(0.6); transition:filter 0.5s;"
        onmouseenter="this.style.filter='grayscale(0)'" onmouseleave="this.style.filter='grayscale(0.6)'" loading="lazy" />
    </div>
    <p style="font-weight:700; margin:12px 0 2px; color:var(--color-dark);">Team Member Name</p>
    <p style="font-size:0.875rem; color:var(--color-muted); margin:0;">Role / Title</p>
  </li>
</ul>
