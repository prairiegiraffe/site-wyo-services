<!-- Hero: Full-bleed with background image
     Use with shell classes: .hero, .hero__bg -->
<section class="hero" data-block-id="page:hero">
  <div class="hero__bg" style="background-image: url('https://source.unsplash.com/1600x900/?construction,site');"></div>
  <div class="container">
    <span class="eyebrow hero__eyebrow">Tagline Text</span>
    <h1 data-content="hero-title">Main Headline Here</h1>
    <p class="hero__subtitle" data-content="hero-subtitle">Supporting text that expands on the headline. One to two sentences.</p>
    <div class="hero__buttons">
      <a href="/contact" class="btn">Primary CTA →</a>
      <a href="/services" class="btn btn--ghost">Secondary CTA</a>
    </div>
  </div>
</section>
