<!-- Project Gallery: Card grid with grayscale-to-color transition
     Use with shell classes: .project-grid, .project-card -->
<div class="project-grid" data-block-id="page:projects">
  <div class="project-card">
    <div class="project-card__image">
      <img src="https://source.unsplash.com/600x375/?construction,site" alt="Project name" loading="lazy" />
    </div>
    <div class="project-card__body">
      <h3>Project Name</h3>
      <p>Brief description of the project scope and outcome.</p>
    </div>
    <div class="project-card__meta">
      <span>Location</span>
      <span>Service Type</span>
      <span>Year</span>
    </div>
  </div>
</div>
