<!-- Features: Alternating Image/Text Rows
     Use with shell classes: .feature-row, .feature-row.reverse -->
<div class="feature-row" data-block-id="page:feature-1">
  <div class="feature-row__image">
    <img src="https://source.unsplash.com/800x600/?construction,equipment" alt="Feature image" loading="lazy" />
  </div>
  <div class="feature-row__body">
    <span class="eyebrow">Service Name</span>
    <h3>Feature Headline</h3>
    <p>Description of this capability or service offering. Keep it concise and specific.</p>
    <a href="/services/slug" class="btn btn--outline" style="margin-top:16px;">Learn More →</a>
  </div>
</div>
<div class="feature-row reverse" data-block-id="page:feature-2">
  <div class="feature-row__image">
    <img src="https://source.unsplash.com/800x600/?construction,site" alt="Feature image" loading="lazy" />
  </div>
  <div class="feature-row__body">
    <span class="eyebrow">Another Service</span>
    <h3>Second Feature</h3>
    <p>Description of this capability. Alternating layout creates visual variety.</p>
    <a href="/services/slug" class="btn btn--outline" style="margin-top:16px;">Learn More →</a>
  </div>
</div>
